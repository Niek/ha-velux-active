name: Release

on:
  workflow_run:
    workflows:
      - HACS
    types:
      - completed

permissions:
  actions: read
  contents: write

jobs:
  release:
    name: Create release
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for Hassfest validation
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          for attempt in $(seq 1 30); do
            state="$(
              gh run list \
                --workflow Hassfest \
                --branch main \
                --commit "$HEAD_SHA" \
                --event push \
                --limit 1 \
                --json conclusion,status,url \
                --jq 'if length == 0 then "" else "\(.[0].status)\t\(.[0].conclusion // "")\t\(.[0].url)" end'
            )"

            if [ -n "$state" ]; then
              IFS=$'\t' read -r status conclusion url <<< "$state"

              if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
                echo "Hassfest passed: $url"
                exit 0
              fi

              if [ "$status" = "completed" ]; then
                echo "Hassfest did not pass: $url"
                exit 1
              fi
            fi

            echo "Waiting for Hassfest validation for $HEAD_SHA ($attempt/30)."
            sleep 10
          done

          echo "Timed out waiting for Hassfest validation for $HEAD_SHA."
          exit 1

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Create patch release
        env:
          GH_REPO: ${{ github.repository }}
          GH_TOKEN: ${{ github.token }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        shell: bash
        run: |
          set -euo pipefail

          semver_tags() {
            git tag --list "v*" | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" || true
          }

          next_tag() {
            latest="$(semver_tags | sort -V | tail -n 1)"

            if [ -z "$latest" ]; then
              echo "v0.1.0"
              return
            fi

            version="${latest#v}"
            IFS=. read -r major minor patch <<< "$version"
            echo "v${major}.${minor}.$((patch + 1))"
          }

          git fetch --tags --force

          existing="$(
            git tag --points-at "$HEAD_SHA" --list "v*" \
              | grep -E "^v[0-9]+\.[0-9]+\.[0-9]+$" \
              | sort -V \
              | tail -n 1 \
              || true
          )"

          if [ -n "$existing" ]; then
            echo "Commit $HEAD_SHA already has release tag $existing."
            exit 0
          fi

          for attempt in $(seq 1 5); do
            git fetch --tags --force
            tag="$(next_tag)"
            echo "Creating $tag for $HEAD_SHA."

            if gh release create "$tag" --target "$HEAD_SHA" --title "$tag" --generate-notes; then
              exit 0
            fi

            echo "Release creation failed for $tag; retrying ($attempt/5)."
            sleep 5
          done

          echo "Could not create a release after 5 attempts."
          exit 1
